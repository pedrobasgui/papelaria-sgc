{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Papelaria Mundo Letrado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="logo">
            <i class="bi bi-pencil-fill" style="font-size: 3rem; color: var(--accent);"></i>
            <h1>Papelaria <span class="accent">Mundo Letrado</span></h1>
            <small>Sistema de Gestão Comercial</small>
        </div>

        <form id="form-login">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username"
                           placeholder="seu.usuario" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password"
                           placeholder="••••••" required>
                </div>
            </div>

            <div id="erro" class="alert alert-danger d-none" role="alert"></div>

            <button type="submit" class="btn btn-papelaria w-100 py-2">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>

            <div class="text-center mt-3">
                <a href="#" class="text-muted small"
                   data-bs-toggle="modal" data-bs-target="#modal-recuperar">
                    Esqueci minha senha
                </a>
            </div>
        </form>
    </div>
</div>

<!-- Modal Recuperar Senha -->
<div class="modal fade" id="modal-recuperar">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Recuperar Senha</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small">
                    Informe o e-mail cadastrado. Você receberá instruções
                    para redefinir sua senha. <em>(funcionalidade completa
                    será implementada na Entrega 3)</em>
                </p>
                <input type="email" class="form-control"
                       id="email-recuperar" placeholder="seu@email.com">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-papelaria" id="btn-enviar-recuperar">Enviar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/api.js' %}"></script>
<script>
    // Se já está autenticado, vai direto pro dashboard
    if (API.isAuthenticated()) window.location.href = '/dashboard/';

    document.getElementById('form-login').addEventListener('submit', async e => {
        e.preventDefault();
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const erroEl = document.getElementById('erro');
        erroEl.classList.add('d-none');

        try {
            await API.login(u, p);
            window.location.href = '/dashboard/';
        } catch (err) {
            erroEl.textContent = err.message || 'Falha no login.';
            erroEl.classList.remove('d-none');
        }
    });

    document.getElementById('btn-enviar-recuperar').addEventListener('click', async () => {
        const email = document.getElementById('email-recuperar').value;
        if (!email) return;
        try {
            const res = await fetch('/api/auth/recuperar-senha/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email }),
            });
            const data = await res.json();
            alert(data.mensagem || 'Solicitação registrada.');
            bootstrap.Modal.getInstance(
                document.getElementById('modal-recuperar')
            ).hide();
        } catch { alert('Erro ao solicitar recuperação.'); }
    });
</script>
</body>
</html>
