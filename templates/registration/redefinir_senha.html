{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - Papelaria Mundo Letrado</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="logo">
            <h1>Papelaria <span class="accent">Mundo Letrado</span></h1>
            <small>Criar nova senha</small>
        </div>

        <div id="step-form">
            <div class="mb-3">
                <label class="form-label">Nova senha</label>
                <input type="password" class="form-control" id="nova-senha"
                       placeholder="mínimo 6 caracteres">
            </div>
            <div class="mb-4">
                <label class="form-label">Confirmar nova senha</label>
                <input type="password" class="form-control" id="confirmar-senha"
                       placeholder="repita a senha">
            </div>
            <div id="erro-form" class="alert alert-danger d-none"></div>
            <button class="btn btn-papelaria w-100" onclick="redefinirSenha()">
                Salvar nova senha
            </button>
        </div>

        <div id="step-sucesso" class="d-none text-center">
            <div class="alert alert-success">
                Senha redefinida com sucesso!
            </div>
            <a href="/login/" class="btn btn-papelaria w-100">Ir para o login</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function redefinirSenha() {
    const novaSenha = document.getElementById('nova-senha').value;
    const confirmar = document.getElementById('confirmar-senha').value;
    const erroEl = document.getElementById('erro-form');
    erroEl.classList.add('d-none');

    if (novaSenha.length < 6) {
        erroEl.textContent = 'A senha deve ter no mínimo 6 caracteres.';
        erroEl.classList.remove('d-none');
        return;
    }
    if (novaSenha !== confirmar) {
        erroEl.textContent = 'As senhas não coincidem.';
        erroEl.classList.remove('d-none');
        return;
    }
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (!token) {
        erroEl.textContent = 'Token inválido. Solicite uma nova recuperação.';
        erroEl.classList.remove('d-none');
        return;
    }
    try {
        const res = await fetch('/api/auth/redefinir-senha/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, nova_senha: novaSenha }),
        });
        const data = await res.json();
        if (!res.ok) {
            erroEl.textContent = data.erro || 'Erro ao redefinir senha.';
            erroEl.classList.remove('d-none');
            return;
        }
        document.getElementById('step-form').classList.add('d-none');
        document.getElementById('step-sucesso').classList.remove('d-none');
    } catch {
        erroEl.textContent = 'Erro de conexão. Tente novamente.';
        erroEl.classList.remove('d-none');
    }
}
</script>
</body>
</html>
