{% extends 'base.html' %}
{% block title %}Venda #{{ venda_id }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 style="color: var(--primary);">
        <i class="bi bi-receipt"></i> Venda #{{ venda_id }}
    </h2>
    <div>
        <a href="/vendas/" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
        <button class="btn btn-outline-secondary" onclick="window.print()">
            <i class="bi bi-printer"></i> Imprimir
        </button>
    </div>
</div>

<div id="conteudo">
    <div class="text-center text-muted py-4">Carregando...</div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
const vendaId = {{ venda_id }};

async function carregar() {
    try {
        const v = await API.vendas.obter(vendaId);
        const statusBadge = v.status === 'CONCLUIDA'
            ? '<span class="badge badge-status-concluida fs-6">CONCLUÍDA</span>'
            : '<span class="badge badge-status-cancelada fs-6">CANCELADA</span>';

        document.getElementById('conteudo').innerHTML = `
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <small class="text-muted">CLIENTE</small>
                            <h5 class="mb-0">${v.cliente.nome}</h5>
                            <small>${v.cliente.cpf}</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <small class="text-muted">VENDEDOR</small>
                            <h5 class="mb-0">${v.usuario.username}</h5>
                            <small>${formatarData(v.data)}</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <small class="text-muted">STATUS</small>
                            <div class="mt-1">${statusBadge}</div>
                            <small>Total: <strong>${formatarBRL(v.valor_total)}</strong></small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><i class="bi bi-list-ul"></i> Itens</div>
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead><tr>
                            <th>Produto</th>
                            <th class="text-end">Qtd</th>
                            <th class="text-end">Preço unit.</th>
                            <th class="text-end">Subtotal</th>
                        </tr></thead>
                        <tbody>
                            ${v.itens.map(i => `<tr>
                                <td>${i.produto.nome}</td>
                                <td class="text-end">${i.quantidade}</td>
                                <td class="text-end">${formatarBRL(i.preco_unitario)}</td>
                                <td class="text-end"><strong>${formatarBRL(i.subtotal)}</strong></td>
                            </tr>`).join('')}
                        </tbody>
                        <tfoot>
                            <tr style="background: var(--accent-light);">
                                <td colspan="3" class="text-end"><strong>TOTAL</strong></td>
                                <td class="text-end" style="color: var(--primary); font-size: 1.2rem;">
                                    <strong>${formatarBRL(v.valor_total)}</strong>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                ${v.observacao ? `<div class="card-footer">
                    <small><strong>Obs.:</strong> ${v.observacao}</small>
                </div>` : ''}
            </div>

            ${v.status === 'CONCLUIDA' ? `
            <div class="text-end mt-3">
                <button class="btn btn-outline-danger" onclick="cancelar()">
                    <i class="bi bi-x-circle"></i> Cancelar venda
                </button>
            </div>` : ''}
        `;
    } catch (e) {
        document.getElementById('conteudo').innerHTML =
            `<div class="alert alert-danger">${e.message}</div>`;
    }
}

async function cancelar() {
    if (!confirma(
        `Tem certeza que deseja cancelar a Venda #${vendaId}?\n\n` +
        `Esta ação irá:\n` +
        `• Marcar a venda como CANCELADA\n` +
        `• Devolver o estoque de todos os produtos\n\n` +
        `Esta ação não pode ser desfeita.`
    )) return;
    try {
        await API.vendas.cancelar(vendaId);
        toast('Venda cancelada e estoque restaurado.', 'success');
        carregar();
    } catch (e) { toast(e.message, 'danger'); }
}

carregar();
</script>
{% endblock %}
