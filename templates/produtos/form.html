{% extends 'base.html' %}
{% block title %}{% if produto_id %}Editar{% else %}Novo{% endif %} Produto{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 style="color: var(--primary);">
        <i class="bi bi-box-seam"></i>
        {% if produto_id %}Editar Produto #{{ produto_id }}{% else %}Novo Produto{% endif %}
    </h2>
    <a href="/produtos/" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form id="form-produto">
            <div class="row g-3">
                <div class="col-md-12">
                    <label class="form-label">Nome <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nome" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control" id="descricao" rows="2"></textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Preço (R$) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" min="0"
                           class="form-control" id="preco" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Estoque <span class="text-danger">*</span></label>
                    <input type="number" min="0" class="form-control"
                           id="estoque" value="0" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Estoque mínimo</label>
                    <input type="number" min="0" class="form-control"
                           id="estoque_minimo" value="5">
                </div>
                <div class="col-12">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox"
                               id="ativo" checked>
                        <label class="form-check-label" for="ativo">
                            Produto ativo (disponível para venda)
                        </label>
                    </div>
                </div>
            </div>

            <hr class="my-4">
            <div class="d-flex justify-content-end gap-2">
                <a href="/produtos/" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-papelaria">
                    <i class="bi bi-check-circle"></i> Salvar
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
const produtoId = {{ produto_id|default:"null" }};

async function carregar() {
    if (!produtoId) return;
    try {
        const p = await API.produtos.obter(produtoId);
        document.getElementById('nome').value           = p.nome;
        document.getElementById('descricao').value      = p.descricao || '';
        document.getElementById('preco').value          = p.preco;
        document.getElementById('estoque').value        = p.estoque;
        document.getElementById('estoque_minimo').value = p.estoque_minimo;
        document.getElementById('ativo').checked        = p.ativo;
    } catch (e) { toast(e.message, 'danger'); }
}

document.getElementById('form-produto').addEventListener('submit', async e => {
    e.preventDefault();
    const precoVal = parseFloat(document.getElementById('preco').value);
    if (isNaN(precoVal) || precoVal < 0) {
        toast('O preço não pode ser negativo.', 'danger');
        return;
    }
    const dados = {
        nome: document.getElementById('nome').value.trim(),
        descricao: document.getElementById('descricao').value.trim(),
        preco: parseFloat(document.getElementById('preco').value),
        estoque: parseInt(document.getElementById('estoque').value),
        estoque_minimo: parseInt(document.getElementById('estoque_minimo').value),
        ativo: document.getElementById('ativo').checked,
    };
    const btn = document.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Salvando...';
    try {
        if (produtoId) {
            await API.produtos.atualizar(produtoId, dados);
            toast('Produto atualizado com sucesso!', 'success');
        } else {
            await API.produtos.criar(dados);
            toast('Produto cadastrado com sucesso!', 'success');
        }
        setTimeout(() => window.location.href = '/produtos/', 800);
    } catch (e) {
        toast(e.message, 'danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-circle"></i> Salvar';
    }
});

carregar();
</script>
{% endblock %}
