{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada - Papelaria Mundo Letrado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="login-container">
    <div class="login-card text-center">
        <div style="font-size: 5rem; color: var(--accent);">
            <i class="bi bi-pencil-fill"></i>
        </div>
        <h1 style="color: var(--primary); font-size: 5rem; font-weight: 800; line-height: 1;">
            404
        </h1>
        <h4 style="color: var(--primary);">Página não encontrada</h4>
        <p class="text-muted">
            A página que você está procurando não existe ou foi movida.
        </p>
        <hr>
        <div class="d-grid gap-2">
            <a href="/dashboard/" class="btn btn-papelaria">
                <i class="bi bi-speedometer2"></i> Ir para o Dashboard
            </a>
            <a href="/login/" class="btn btn-outline-secondary">
                <i class="bi bi-box-arrow-in-right"></i> Voltar para o Login
            </a>
        </div>
    </div>
</div>
</body>
</html>
